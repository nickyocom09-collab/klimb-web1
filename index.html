<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Klimb</title>

  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#04130c">
  <link rel="apple-touch-icon" href="/klimb.logo-removebg-preview.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <!-- Warm up the map tile CDN so the first map open paints fast. -->
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin>
  <link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin>

  <!-- Pre-JS splash so the very first paint is branded, not blank. React
       replaces #root on mount, removing this automatically. Styles are inline
       here (the stylesheet hasn't loaded yet at first paint). -->
  <style>
    /* Boot splash — solid dark stage, icon springs in, wordmark follows.
       Mirrors .klimb-splash in the app stylesheet for a seamless handoff. */
    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #0a0a0b;
    }
    #boot-splash .glow {
      position: absolute;
      width: 60vmin;
      height: 60vmin;
      border-radius: 9999px;
      background: radial-gradient(circle, rgba(57, 255, 136, 0.18), transparent 62%);
      filter: blur(30px);
      animation: boot-breathe 2.8s ease-in-out infinite;
    }
    #boot-splash .mark {
      position: relative;
      width: 132px;
      height: 132px;
      filter: drop-shadow(0 12px 36px rgba(57, 255, 136, 0.28));
      animation: boot-pop 0.6s cubic-bezier(0.34, 1.45, 0.5, 1) both;
    }
    /* The K draws itself in, stroke by stroke, then the hold dot pops. */
    #boot-splash .k-stroke {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: boot-draw 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    #boot-splash .k-stroke--2 { animation-delay: 0.25s; }
    #boot-splash .k-dot {
      transform-origin: 91px 34px;
      transform: scale(0);
      animation: boot-dot 0.4s cubic-bezier(0.34, 1.8, 0.5, 1) 0.85s forwards;
    }
    @keyframes boot-pop {
      0% { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes boot-draw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes boot-dot {
      to { transform: scale(1); }
    }
    @keyframes boot-breathe {
      0%, 100% { transform: scale(0.92); opacity: 0.65; }
      50% { transform: scale(1.06); opacity: 1; }
    }
    @media (prefers-reduced-motion: reduce) {
      #boot-splash .glow, #boot-splash .mark { animation: none; }
      #boot-splash .k-stroke { animation: none; stroke-dashoffset: 0; }
      #boot-splash .k-dot { animation: none; transform: scale(1); }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="boot-splash">
      <div class="glow"></div>
      <svg class="mark" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- userSpaceOnUse: bounding-box gradients can't resolve on the
               zero-width vertical stroke of the K. -->
          <linearGradient id="boot-kg" gradientUnits="userSpaceOnUse" x1="0" y1="30" x2="0" y2="90">
            <stop offset="0" stop-color="#8dffc0"/>
            <stop offset="1" stop-color="#1fb862"/>
          </linearGradient>
        </defs>
        <rect x="6" y="6" width="108" height="108" rx="30" fill="#141417" stroke="rgba(57,255,136,0.22)" stroke-width="1.5"/>
        <path class="k-stroke" pathLength="100" d="M40 32 V88" stroke="url(#boot-kg)" stroke-width="13" stroke-linecap="round"/>
        <path class="k-stroke k-stroke--2" pathLength="100" d="M78 34 L47 60 L80 88" stroke="url(#boot-kg)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="k-dot" cx="91" cy="34" r="6.5" fill="#FF9F45"/>
      </svg>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
