<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Pinch-zoom stays enabled for accessibility; iOS input-focus zoom is
       prevented by keeping all form controls at >=16px (see index.css). -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Klimb</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#04130c">
  <link rel="apple-touch-icon" href="/klimb.logo-removebg-preview.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">

  <!-- Warm up the map tile CDN so the first map open paints fast. -->
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin>
  <link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin>
  <link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin>

  <!-- Pre-JS splash so the very first paint is branded, not blank. React
       replaces #root on mount, removing this automatically. Styles are inline
       here (the stylesheet hasn't loaded yet at first paint). -->
  <style>
    /* Boot splash — the Klimb mark on pure black. Calm and quiet: the tile
       eases in, then breathes gently. No text, no spinners. Mirrors
       .klimb-splash in the app stylesheet for a seamless handoff. */
    #boot-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #000;
    }
    #boot-splash .mark {
      width: 140px;
      height: 140px;
      color: #f2efe8;
      filter: drop-shadow(0 18px 44px rgba(255, 255, 255, 0.08));
      animation:
        boot-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) both,
        boot-breathe 4.5s ease-in-out 0.9s infinite;
    }
    @keyframes boot-in {
      0% { transform: scale(0.86); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes boot-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.035); }
    }
    @media (prefers-reduced-motion: reduce) {
      #boot-splash .mark { animation: none; }
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="boot-splash">
      <img class="mark" src="/klimb-loading.png" alt="Klimb" />
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
